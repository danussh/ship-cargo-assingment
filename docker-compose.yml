version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shipiq-cargo-optimizer
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - API_VERSION=v1
      - HOST=0.0.0.0
      - PORT=8000
      - MAX_CARGO_COUNT=10000
      - MAX_TANK_COUNT=10000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
